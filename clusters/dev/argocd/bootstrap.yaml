# Argo CD Bootstrap Configuration
# This manifest installs Argo CD in the cluster

apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    argocd.argoproj.io/managed-by: argocd
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: argocd-operator-group
  namespace: argocd
spec:
  targetNamespaces:
  - argocd
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: argocd-operator
  namespace: argocd
spec:
  channel: stable
  name: argocd-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: example-argocd
  namespace: argocd
spec:
  server:
    route:
      enabled: true
    ingress:
      enabled: true
  dex:
    openShiftOAuth: true
  resourceConfigurations:
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: applications.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: applicationsets.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:appprojects.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:argocds.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:argocdexportrequests.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:argocdinstallations.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:clustersets.argoproj.io
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name:clusters.argoproj.io